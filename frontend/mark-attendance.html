<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mark Attendance</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="topbar">
  <h1>Mark Attendance</h1>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="reports.html">Reports</a>
    <button onclick="logout()">Logout</button>
  </nav>
</header>

<div class="container">
  <div class="card">
    <div class="actions-bar">
      <div>
        <label for="subjectSelect">Subject</label>
        <select id="subjectSelect"></select>
      </div>
      <div>
        <label for="dateInput">Date</label>
        <input type="date" id="dateInput" />
      </div>
      <div>
        <button class="primary" style="margin-top:20px;" onclick="loadSheet()">Load Sheet</button>
      </div>
    </div>

    <p class="success-msg" id="successMsg"></p>
    <p class="error-msg" id="errorMsg"></p>

    <table id="sheetTable" style="display:none;">
      <thead>
        <tr><th>Roll No</th><th>Name</th><th>Status</th></tr>
      </thead>
      <tbody id="sheetBody"></tbody>
    </table>

    <button class="primary" id="saveBtn" style="display:none; max-width:220px;" onclick="saveAttendance()">Save Attendance</button>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  requireRole("staff");

  let currentRecords = []; // [{student_id, roll_no, name, status}]

  document.getElementById("dateInput").valueAsDate = new Date();

  async function loadSubjects() {
    try {
      const subjects = await apiFetch("/attendance/subjects");
      const select = document.getElementById("subjectSelect");
      select.innerHTML = subjects
        .map((s) => `<option value="${s.id}">${s.subject_name} (${s.subject_code})</option>`)
        .join("");
    } catch (err) {
      document.getElementById("errorMsg").textContent = err.message;
    }
  }
  loadSubjects();

  async function loadSheet() {
    const subject_id = document.getElementById("subjectSelect").value;
    const date = document.getElementById("dateInput").value;
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    errorMsg.textContent = "";
    successMsg.textContent = "";

    if (!subject_id || !date) {
      errorMsg.textContent = "Please select a subject and a date.";
      return;
    }

    try {
      const data = await apiFetch(`/attendance/mark?subject_id=${subject_id}&date=${date}`);
      currentRecords = data;
      renderSheet();
    } catch (err) {
      errorMsg.textContent = err.message;
    }
  }

  function renderSheet() {
    const tbody = document.getElementById("sheetBody");
    tbody.innerHTML = currentRecords
      .map(
        (r, idx) => `
      <tr>
        <td>${r.roll_no}</td>
        <td>${r.name}</td>
        <td>
          <div class="status-toggle">
            <button type="button" class="present ${r.status === "Present" ? "active" : ""}" onclick="setStatus(${idx}, 'Present')">Present</button>
            <button type="button" class="absent ${r.status === "Absent" ? "active" : ""}" onclick="setStatus(${idx}, 'Absent')">Absent</button>
          </div>
        </td>
      </tr>`
      )
      .join("");

    document.getElementById("sheetTable").style.display = "table";
    document.getElementById("saveBtn").style.display = "inline-block";
  }

  function setStatus(idx, status) {
    currentRecords[idx].status = status;
    renderSheet();
  }

  async function saveAttendance() {
    const subject_id = document.getElementById("subjectSelect").value;
    const date = document.getElementById("dateInput").value;
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    errorMsg.textContent = "";
    successMsg.textContent = "";

    const records = currentRecords.map((r) => ({ student_id: r.student_id, status: r.status }));

    try {
      await apiFetch("/attendance/mark", {
        method: "POST",
        body: JSON.stringify({ subject_id, date, records }),
      });
      successMsg.textContent = "Attendance saved successfully.";
    } catch (err) {
      errorMsg.textContent = err.message;
    }
  }
</script>

</body>
</html>
