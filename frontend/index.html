<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - Attendance Management System</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <h2>Attendance System</h2>

    <div class="tabs">
      <button id="tabStaff" class="active" onclick="switchTab('staff')">Staff Login</button>
      <button id="tabStudent" onclick="switchTab('student')">Student Login</button>
    </div>

    <!-- Staff login form -->
    <form id="staffForm">
      <label for="staffEmail">Email</label>
      <input type="email" id="staffEmail" required placeholder="staff@college.edu" />

      <label for="staffPassword">Password</label>
      <input type="password" id="staffPassword" required placeholder="••••••••" />

      <button type="submit" class="primary">Login as Staff</button>
    </form>

    <!-- Student login form -->
    <form id="studentForm" style="display:none;">
      <label for="studentRoll">Roll Number</label>
      <input type="text" id="studentRoll" required placeholder="e.g. CSE2023045" />

      <label for="studentPassword">Password</label>
      <input type="password" id="studentPassword" required placeholder="••••••••" />

      <button type="submit" class="primary">Login as Student</button>
    </form>

    <p class="error-msg" id="errorMsg"></p>
    <p class="small-note" style="text-align:center;">
      No account? Registration is done by the admin via the API (<code>/api/auth/staff/register</code> or <code>/api/auth/student/register</code>).
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  const existingUser = getUser();
  if (existingUser && getToken()) {
    window.location.href = existingUser.role === "staff" ? "dashboard.html" : "student.html";
  }

  function switchTab(which) {
    document.getElementById("tabStaff").classList.toggle("active", which === "staff");
    document.getElementById("tabStudent").classList.toggle("active", which === "student");
    document.getElementById("staffForm").style.display = which === "staff" ? "block" : "none";
    document.getElementById("studentForm").style.display = which === "student" ? "block" : "none";
    document.getElementById("errorMsg").textContent = "";
  }

  document.getElementById("staffForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("staffEmail").value.trim();
    const password = document.getElementById("staffPassword").value;
    const errorMsg = document.getElementById("errorMsg");
    errorMsg.textContent = "";

    try {
      const data = await apiFetch("/auth/staff/login", {
        method: "POST",
        body: JSON.stringify({ email, password }),
      });
      saveSession(data.token, data.user);
      window.location.href = "dashboard.html";
    } catch (err) {
      errorMsg.textContent = err.message;
    }
  });

  document.getElementById("studentForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const roll_no = document.getElementById("studentRoll").value.trim();
    const password = document.getElementById("studentPassword").value;
    const errorMsg = document.getElementById("errorMsg");
    errorMsg.textContent = "";

    try {
      const data = await apiFetch("/auth/student/login", {
        method: "POST",
        body: JSON.stringify({ roll_no, password }),
      });
      saveSession(data.token, data.user);
      window.location.href = "student.html";
    } catch (err) {
      errorMsg.textContent = err.message;
    }
  });
</script>

</body>
</html>
